# FIPS gateway configuration
# This file controls the FIPS mesh gateway functionality

# Enable gateway mode
gateway_enabled=true

# Gateway interface (interface to external network)
gateway_interface=wan

# Mesh interface (interface to mesh network)
mesh_interface=br-mesh

# Enable IP forwarding for gateway functionality
ip_forward=true

# Enable NAT for mesh clients
masquerade=true

# Gateway announcement interval (seconds)
announce_interval=60

# Maximum number of clients through this gateway
max_clients=100

# Enable gateway metrics
metrics_enabled=true

# Gateway listen port
gateway_port=9002

# Access control list (comma-separated node IDs)
allowed_clients=

# Gateway status file
status_file=/var/run/fips-gateway.status