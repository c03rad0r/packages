# FIPS mesh network daemon configuration
# This file controls the basic operation of the FIPS mesh daemon

# Network interface to use for mesh communication
interface=br-mesh

# Mesh network ID (must be same across all nodes)
mesh_id=freedomtech

# Node identity (hostname or unique identifier)
node_id=$(hostname)

# Listening port for mesh communication
port=9001

# Enable IPv6 support
ipv6=true

# Enable NAT traversal
nat_traversal=true

# Maximum number of peer connections
max_peers=50

# Enable mesh routing
mesh_routing=true

# Logging level: error, warn, info, debug
log_level=info

# PID file location
pid_file=/var/run/fips.pid