# MPTCP bonding sysctl configuration
# These settings enable and optimize Multipath TCP for bonding

# Enable MPTCP
net.mptcp.enabled=1

# Enable MPTCP path manager
net.mptcp.mptcp_path_manager=fullmesh

# Enable MPTCP scheduler
net.mptcp.mptcp_scheduler=roundrobin

# Increase MPTCP connection limits
net.mptcp.mptcp_add_addr_timeout=600

# Enable MPTCP checksums for reliability
net.mptcp.mptcp_checksum=1

# Optimize TCP for MPTCP bonding
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_low_latency=1

# Increase socket buffer sizes for better performance
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.ipv4.tcp_rmem='4096 87380 16777216'
net.ipv4.tcp_wmem='4096 65536 16777216'

# Enable IP forwarding for MPTCP gateway functionality
net.ipv4.ip_forward=1
net.ipv6.conf.all.forwarding=1