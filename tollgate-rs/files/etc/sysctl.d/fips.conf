# FIPS mesh network sysctl configuration
# These settings optimize the system for mesh networking

# Enable IP forwarding
net.ipv4.ip_forward=1
net.ipv6.conf.all.forwarding=1

# Disable ICMP redirects
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0

# Enable ARP filtering for mesh interfaces
net.ipv4.conf.all.arp_filter=1
net.ipv4.conf.all.arp_announce=2
net.ipv4.conf.all.arp_ignore=1

# Optimize TCP for mesh networks
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_low_latency=1
net.ipv4.tcp_tw_reuse=1

# Increase connection tracking limits for mesh traffic
net.netfilter.nf_conntrack_max=131072
net.netfilter.nf_conntrack_tcp_timeout_established=3600

# Enable multicast for mesh discovery
net.ipv4.icmp_echo_ignore_broadcasts=0

# Optimize for wireless mesh interfaces
net.core.rmem_max=4194304
net.core.wmem_max=4194304
net.ipv4.tcp_rmem='4096 65536 4194304'
net.ipv4.tcp_wmem='4096 65536 4194304'